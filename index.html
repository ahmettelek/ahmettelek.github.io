<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim...</title>

<!-- FontAwesome (Kalp ikonları için) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- Google Fonts (Zarif yazı tipi) -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    /* Eski sitendeki laci/siyah hareketli arka planı biraz daha koyu ve romantik bir tona çektik */
    background: linear-gradient(-45deg, #0f172a, #111827, #000000, #1e1b4b);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    overflow: hidden; /* Kaydırmayı kapattık, tam ekran kalacak */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    font-family: 'Playfair Display', serif;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 💌 YAZI TASARIMI */
.message-container {
    z-index: 10;
    padding: 20px;
    animation: fadeIn 3s ease forwards;
}

h1 {
    font-size: 3.5rem;
    font-weight: 500;
    font-style: italic;
    color: #f8fafc;
    margin-bottom: 15px;
    text-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
}

p {
    font-size: 1.8rem;
    font-style: italic;
    color: #cbd5e1;
}

/* Vurgulu kelimeler için hafif pembe tonu */
.highlight {
    color: #fb7185;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ❤️ KALP ANİMASYONLARI */
.hearts-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 1;
    pointer-events: none; /* Kalpler yazıyı tıklamayı engellemesin */
}

.heart {
    position: absolute;
    bottom: -10vh;
    opacity: 0;
    animation: floatUp 6s linear infinite;
    color: #e11d48;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
}

/* Farklı kalpler için gecikmeler ve boyutlar */
.heart:nth-child(1) { left: 10%; animation-delay: 0s; font-size: 2rem; color: #fb7185; animation-duration: 7s; }
.heart:nth-child(2) { left: 30%; animation-delay: 2s; font-size: 3rem; color: #be123c; animation-duration: 5s; }
.heart:nth-child(3) { left: 50%; animation-delay: 4s; font-size: 1.5rem; color: #f43f5e; animation-duration: 8s; }
.heart:nth-child(4) { left: 70%; animation-delay: 1s; font-size: 2.5rem; color: #fda4af; animation-duration: 6s; }
.heart:nth-child(5) { left: 85%; animation-delay: 3s; font-size: 2rem; color: #e11d48; animation-duration: 7s; }
.heart:nth-child(6) { left: 20%; animation-delay: 5s; font-size: 1.8rem; color: #be123c; animation-duration: 6.5s; }
.heart:nth-child(7) { left: 80%; animation-delay: 0.5s; font-size: 2.2rem; color: #fb7185; animation-duration: 5.5s; }

/* 📱 MOBİL UYUM */
@media (max-width: 768px) {
    h1 { font-size: 2.5rem; }
    p { font-size: 1.3rem; }
}
</style>
</head>

<body>

    <!-- Animasyonlu Kalpler -->
    <div class="hearts-container">
        <i class="fas fa-heart heart"></i>
        <i class="fas fa-heart heart"></i>
        <i class="fas fa-heart heart"></i>
        <i class="fas fa-heart heart"></i>
        <i class="fas fa-heart heart"></i>
        <i class="fas fa-heart heart"></i>
        <i class="fas fa-heart heart"></i>
    </div>

    <!-- Özür Mesajı -->
    <div class="message-container">
        <h1>Özür dilerim <span class="highlight">Azracım...</span></h1>
        <p>Beni affet, hayvanlık ettim.</p>
    </div>

</body>
</html>
