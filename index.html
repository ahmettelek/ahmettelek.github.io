<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmet Telek</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    color: white;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #0f172a);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

/* 🎬 Background animation */
@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 📦 Container */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* 🧭 Navbar */
nav {
    position: sticky;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 15px;
    z-index: 1000;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 0.95rem;
}

/* 🏠 Hero */
header {
    text-align: center;
    padding: 80px 15px;
}

header h1 {
    font-size: 2.2rem;
}

header p {
    margin-top: 10px;
    color: #94a3b8;
    font-size: 0.95rem;
}

/* 📚 Sections */
.section {
    margin-top: 60px;
}

.section h2 {
    margin-bottom: 15px;
    font-size: 1.5rem;
}

/* 💻 Projects */
.projects {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

/* 📬 Contact */
.icons {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
}

.icons a {
    color: white;
    margin: 10px;
    font-size: 1.5rem;
    transition: 0.3s;
}

.icons a:hover {
    color: #38bdf8;
}

/* 🔚 Footer */
footer {
    text-align: center;
    margin-top: 60px;
    padding: 20px;
    color: #94a3b8;
    font-size: 0.9rem;
}

/* 📱 Tablet */
@media(min-width: 768px) {
    header h1 {
        font-size: 2.8rem;
    }

    header p {
        font-size: 1rem;
    }

    .projects {
        grid-template-columns: 1fr 1fr;
    }
}

/* 💻 Desktop */
@media(min-width: 1024px) {
    header {
        padding: 120px 20px;
    }

    header h1 {
        font-size: 3.2rem;
    }

    .projects {
        grid-template-columns: 1fr 1fr 1fr;
    }
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#education">Education</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<div class="container">

<header id="home">
<h1>Ahmet Telek</h1>
<p>Computer Engineering Student</p>
<p>Building projects and focusing on software development.</p>
</header>

<section class="section" id="education">
<h2>Education</h2>
<p>
Computer Engineering <br>
Istanbul University <br>
2024 – Present
</p>
</section>

<section class="section" id="projects">
<h2>Projects</h2>
<div class="projects">
<div class="card">
<h3>Coming Soon</h3>
<p>Projects will be added here.</p>
</div>
</div>
</section>

<section class="section" id="contact">
<h2>Contact</h2>

<div class="icons">
<a href="https://github.com/ahmettelek"><i class="fab fa-github"></i></a>
<a href="https://linkedin.com/in/ahmettelek/"><i class="fab fa-linkedin"></i></a>
<a href="https://instagram.com/ahmett.telek"><i class="fab fa-instagram"></i></a>
<a href="mailto:emailin@mail.com"><i class="fas fa-envelope"></i></a>
</div>

</section>

<footer>
<p>© 2026 Ahmet Telek</p>
</footer>

</div>

</body>
</html>
