<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmet Telek</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background: #0f172a;
    color: white;
}

/* 🔝 NAVBAR */
nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.logo {
    font-weight: bold;
    letter-spacing: 2px;
}

.menu {
    display: flex;
    gap: 25px;
}

.menu a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
}

.menu a:hover {
    color: #38bdf8;
}

/* 🏠 HERO */
header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 40px;
}

header h1 {
    font-size: 3rem;
}

header p {
    margin-top: 10px;
    color: #94a3b8;
}

/* 📦 SECTIONS */
section {
    padding: 120px 40px;
    max-width: 1000px;
    margin: auto;
    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 1s forwards;
}

section:nth-child(2) { animation-delay: 0.2s; }
section:nth-child(3) { animation-delay: 0.4s; }
section:nth-child(4) { animation-delay: 0.6s; }

/* 🎬 ANIMATION */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 💻 PROJECTS */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

/* 📬 CONTACT */
.icons {
    display: flex;
    gap: 20px;
    font-size: 1.5rem;
}

.icons a {
    color: white;
    transition: 0.3s;
}

.icons a:hover {
    color: #38bdf8;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
    nav {
        padding: 15px 20px;
    }

    header {
        padding: 0 20px;
    }

    header h1 {
        font-size: 2.2rem;
    }

    .menu {
        gap: 15px;
        font-size: 0.8rem;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">AHMET TELEK</div>

    <div class="menu">
        <a href="#home">Home</a>
        <a href="#education">Education</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<header id="home">
    <h1>Ahmet Telek</h1>
    <p>Computer Engineering Student</p>
    <p>Building clean and functional software projects.</p>
</header>

<section id="education">
    <h2>Education</h2>
    <p>Computer Engineering – Istanbul University (2024 – Present)</p>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="card">
        Projects will be added here.
    </div>
</section>

<section id="contact">
    <h2>Contact</h2>

    <div class="icons">
        <a href="#"><i class="fab fa-ahmettelek"></i></a>
        <a href="#"><i class="fab fa-ahmettelek"></i></a>
        <a href="#"><i class="fab fa-ahmett.telek"></i></a>
        <a href="mailto:mail@example.com"><i class="fas fa-envelope"></i></a>
    </div>
</section>

</body>
</html>
